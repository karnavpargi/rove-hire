# =============================================================================
# ROVE Hire — Production Docker Compose (pre-built registry images)
# Build/push locally: pnpm docker:push
# Deploy to server:   pnpm deploy:registry
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: rove-hire-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rove_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-rove_hire}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-rove_user} -d ${POSTGRES_DB:-rove_hire}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rove-network

  api:
    image: ${API_IMAGE:?API_IMAGE is required — set in deploy/deploy.env}
    container_name: rove-hire-api
    restart: unless-stopped
    ports:
      - '127.0.0.1:${API_HOST_PORT:-13000}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-rove_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rove_hire}?schema=public
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-${AWS_S3_BUCKET_NAME:-rove-hire-files}}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      FRONTEND_URL: ${APP_URL:?APP_URL is required}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ENABLE_HSTS: ${ENABLE_HSTS:-false}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rove-network

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required — set in deploy/deploy.env}
    container_name: rove-hire-web
    restart: unless-stopped
    ports:
      - '127.0.0.1:${WEB_HOST_PORT:-13001}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    networks:
      - rove-network

  db-setup:
    profiles: [setup]
    image: ${DB_SETUP_IMAGE:?DB_SETUP_IMAGE is required — set in deploy/deploy.env}
    container_name: rove-hire-db-setup
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rove_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rove_hire}?schema=public
    command: >
      sh -c "cd apps/api &&
      pnpm exec prisma migrate deploy &&
      pnpm exec prisma db seed"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rove-network

networks:
  rove-network:
    driver: bridge
